<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UKAS Lab Search{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        navy: { 950: '#020617', 900: '#0c1222', 800: '#131d35', 700: '#1a2847' },
                        teal: { 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488' },
                        accent: '#0ea5e9'
                    },
                    fontFamily: {
                        display: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif'],
                        mono: ['"DM Mono"', '"Fira Code"', 'monospace'],
                        body: ['"Plus Jakarta Sans"', 'system-ui', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-navy-950 text-slate-200 min-h-screen font-body antialiased">

    <nav class="relative z-10 border-b border-white/5">
        <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="/" class="flex items-center gap-3 group">
                <div class="w-8 h-8 rounded border border-accent/40 flex items-center justify-center bg-accent/5 group-hover:bg-accent/10 transition-colors">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="none" class="text-accent">
                        <circle cx="8" cy="8" r="6.5" stroke="currentColor" stroke-width="1"/>
                        <line x1="8" y1="2" x2="8" y2="14" stroke="currentColor" stroke-width="0.5" stroke-dasharray="1 1.5"/>
                        <line x1="2" y1="8" x2="14" y2="8" stroke="currentColor" stroke-width="0.5" stroke-dasharray="1 1.5"/>
                        <circle cx="8" cy="8" r="1.5" fill="currentColor"/>
                    </svg>
                </div>
                <div>
                    <span class="text-lg font-semibold text-white tracking-tight font-display">LabScope</span>
                    <span class="text-[10px] font-mono text-slate-500 ml-2 tracking-widest uppercase">UKAS Search</span>
                </div>
            </a>
            <div class="hidden sm:flex items-center gap-2 text-xs font-mono text-slate-500">
                <span class="inline-block w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span>
                <span>1,524 labs</span>
                <span class="text-slate-700">/</span>
                <span>14,298 capabilities</span>
            </div>
        </div>
    </nav>

    <main class="relative z-10">
        {% block content %}{% endblock %}
    </main>

    <footer class="relative z-10 border-t border-white/5 mt-20">
        <div class="max-w-6xl mx-auto px-6 py-6 flex items-center justify-between text-xs font-mono text-slate-600">
            <span>Data sourced from UKAS accreditation schedules</span>
            <span>Powered by semantic search</span>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
