services:
  - type: web
    name: ukas-lab-search
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn asgi:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: LABS_MCP_API_KEYS
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: TURNSTILE_SITE_KEY
        sync: false
      - key: TURNSTILE_SECRET_KEY
        sync: false
      - key: SITE_PASSWORD
        sync: false
